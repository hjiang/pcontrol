# Robolectric project-wide defaults for the :app tests.
#
# SDK 26 (the app's minSdk) is the lowest level at which AppCompat 1.7.1 +
# Material 1.13.0 reliably inflate under Robolectric 4.16.1 on JDK 17
# (SDK 23 fails with PackageParser errors against the merged APK). It is
# pinned here so the project-wide `testOptions { unitTests {
# isIncludeAndroidResources = true } }` setting does not let
# `DefaultSdkPicker` try to fetch an unavailable SDK 37 android-all jar
# when the merged manifest exposes targetSdk=37.
# Tests that need higher-level behavior override this with @Config(sdk=[..]).
sdk=26