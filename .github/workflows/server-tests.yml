# Run all server tests on push when files in the server/ directory change.

name: Server Tests

on:
  push:
    paths:
      - 'server/**'

jobs:
  test:
    name: Run Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run all server tests
        run: |
          cd server
          go test ./... -v -count=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: server/**/test-output/
          compression-level: 6
