# Build and publish pcontrold Docker image to GHCR.
#
# On main-branch pushes touching server/:
#   ghcr.io/<owner>/pcontrol-server:latest
#   ghcr.io/<owner>/pcontrol-server:sha-<short>
#
# On server-v* tags (e.g. server-v0.1.0):
#   ghcr.io/<owner>/pcontrol-server:0.1.0  (version extracted from tag)
#   ghcr.io/<owner>/pcontrol-server:latest
#   ghcr.io/<owner>/pcontrol-server:sha-<short>
#
# On pull requests: build only (no push), catching Dockerfile breakage.

name: Server Image

on:
  push:
    branches:
      - main
    tags:
      - 'server-v*'
    paths:
      - 'server/**'
      - '.github/workflows/server-image.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pcontrol-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=match,pattern=server-v(.*),group=1

      - name: Append latest tag on server-v* releases
        id: final_tags
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          TAGS="$(echo "${TAGS}" | tr '\n' ',')"
          if [[ "${{ github.ref }}" == refs/tags/server-v* ]]; then
            TAGS+=",ghcr.io/${{ github.repository_owner }}/pcontrol-server:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.final_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
