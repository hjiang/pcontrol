# Build Android APK on `android-*` tag pushes.
#
# Secrets required for signing (set in the repo):
#   ANDROID_KEYSTORE_B64       — base64-encoded JKS keystore
#   ANDROID_KEYSTORE_PASSWORD  — keystore password
#   ANDROID_KEY_ALIAS          — key alias
#   ANDROID_KEY_PASSWORD       — key password
#
# If the secrets are missing the APK is still built and uploaded unsigned.

name: Build Android App

on:
  push:
    tags:
      - 'android-*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Strip the "android-" prefix to get the version, e.g.
          #   android-v1.2.3 → v1.2.3
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#android-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.4.1

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 9.4.1

      - name: Build release APK
        run: |
          cd android
          ./gradlew :app:assembleRelease

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "${APK}" ]; then
            echo "::error::No APK found in android/app/build/outputs/apk/release/"
            exit 1
          fi
          echo "path=${APK}" >> "$GITHUB_OUTPUT"

      - name: Check signing secrets
        id: check_secrets
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          [ -n "${KEYSTORE_B64}" ] || missing+=("ANDROID_KEYSTORE_B64")
          [ -n "${KEYSTORE_PASSWORD}" ] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [ -n "${KEY_ALIAS}" ] || missing+=("ANDROID_KEY_ALIAS")
          [ -n "${KEY_PASSWORD}" ] || missing+=("ANDROID_KEY_PASSWORD")

          if [ ${#missing[@]} -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing disabled; missing secrets: ${missing[*]}"
          fi

      - name: Install Android SDK (for zipalign & apksigner)
        if: steps.check_secrets.outputs.available == 'true'
        uses: android-actions/setup-android@v4

      - name: Align and sign APK
        if: steps.check_secrets.outputs.available == 'true'
        id: sign
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "${KEYSTORE_B64}" | base64 --decode > /tmp/release.keystore

          APK="${{ steps.apk.outputs.path }}"
          DIR="$(dirname "${APK}")"
          UNSIGNED="${APK}"
          ALIGNED="${DIR}/app-release-aligned.apk"
          SIGNED="${DIR}/app-release-signed.apk"

          # Locate zipalign and apksigner in the Android SDK
          SDK_ROOT="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "${SDK_ROOT}" ]; then
            echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT not set"
            exit 1
          fi
          BUILD_TOOLS="${SDK_ROOT}/build-tools"
          ZIPALIGN=$(find "${BUILD_TOOLS}" -name zipalign -type f | head -1)
          APKSIGNER=$(find "${BUILD_TOOLS}" -name apksigner -type f | head -1)

          if [ -z "${ZIPALIGN}" ]; then
            echo "::error::zipalign not found under ${BUILD_TOOLS}"
            exit 1
          fi
          if [ -z "${APKSIGNER}" ]; then
            echo "::error::apksigner not found under ${BUILD_TOOLS}"
            exit 1
          fi

          # 1. Align
          echo "--- Aligning with zipalign ---"
          "${ZIPALIGN}" -p -f 4 "${UNSIGNED}" "${ALIGNED}"

          # 2. Sign
          echo "--- Signing with apksigner ---"
          "${APKSIGNER}" sign \
            --ks /tmp/release.keystore \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "${KEY_ALIAS}" \
            --key-pass env:KEY_PASSWORD \
            --out "${SIGNED}" \
            "${ALIGNED}"

          # 3. Verify
          echo "--- Verifying signature ---"
          "${APKSIGNER}" verify "${SIGNED}"

          # Update APK path to the signed artifact
          echo "path=${SIGNED}" >> "$GITHUB_OUTPUT"

          # Clean up
          rm -f /tmp/release.keystore

      - name: Resolve final APK path
        id: final_apk
        run: |
          # Use signed path if signing ran, otherwise use the original unsigned
          if [ -n "${{ steps.sign.outputs.path }}" ]; then
            APK="${{ steps.sign.outputs.path }}"
          else
            APK="${{ steps.apk.outputs.path }}"
          fi
          echo "path=${APK}" >> "$GITHUB_OUTPUT"

      - name: Rename APK for upload
        id: rename
        run: |
          APK="${{ steps.final_apk.outputs.path }}"
          VERSION="${{ steps.version.outputs.version }}"
          DIR="$(dirname "${APK}")"
          FINAL="${DIR}/pcontrol-${VERSION}.apk"
          cp "${APK}" "${FINAL}"
          echo "path=${FINAL}" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: pcontrol-android-${{ steps.version.outputs.version }}
          path: ${{ steps.rename.outputs.path }}
          compression-level: 0  # APK is already compressed

      - name: Delete existing release for clean rerun
        if: github.run_attempt > 1
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            gh release delete "${{ steps.version.outputs.tag }}" --yes
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          files: ${{ steps.rename.outputs.path }}
          generate_release_notes: true
