# Run all Android tests on push when files in the android/ directory change.
#
# Generates the Gradle wrapper on CI (the project doesn't ship one)
# and then runs unit tests for every module under android/.

name: Android Tests

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'

jobs:
  test:
    name: Run Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 9.4.1

      - name: Run all Android tests
        run: |
          cd android
          ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: android/**/build/reports/tests/
          compression-level: 6
